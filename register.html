<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册账号 - 学术喵的奇幻之旅</title>
  <link rel="stylesheet" href="play.css">
</head>
<body>
  <main class="play-shell auth-only">
    <section class="start-overlay register-overlay" aria-label="注册账号">
      <div class="login-card register-card" role="presentation">
        <div class="login-crest" aria-hidden="true"></div>
        <div class="login-brand">
          <p class="eyebrow">CREATE PLAYER ARCHIVE</p>
          <h1>建立学术档案</h1>
          <p class="title-subtitle">樱花同济篇</p>
          <p class="title-en">The Erudite Feline's Wonder Voyage</p>
          <p class="title-chronicle">TJU: Cherry Blossom Chronicle</p>
        </div>

        <form id="registerForm" class="login-form">
          <label class="field">
            <span>账号</span>
            <input id="registerAccountInput" name="username" maxlength="18" autocomplete="username" placeholder="3-18 位字母数字或下划线" required>
          </label>
          <label class="field">
            <span>昵称</span>
            <input id="registerNicknameInput" name="nickname" maxlength="12" autocomplete="nickname" placeholder="显示在同学头顶的名字" required>
          </label>
          <label class="field">
            <span>密码</span>
            <input id="registerPasswordInput" name="password" type="password" maxlength="32" autocomplete="new-password" placeholder="至少 6 位" required>
          </label>
          <label class="field">
            <span>确认密码</span>
            <input id="registerConfirmInput" name="confirm" type="password" maxlength="32" autocomplete="new-password" placeholder="再输入一次密码" required>
          </label>

          <div class="character-field">
            <span>选择角色</span>
            <div id="characterOptions" class="character-options" aria-label="选择角色"></div>
          </div>

          <button id="registerButton" class="primary login-submit" type="submit">创建并进入游戏</button>
          <div class="login-links">
            <span>已有账号？</span>
            <a href="play.html">返回登录</a>
          </div>
          <p id="registerHint" class="hint" aria-live="polite">账号会保存在服务器，角色和游戏进度会写入 SQLite。</p>
        </form>
      </div>
    </section>
  </main>

  <script src="register.js"></script>
</body>
</html>
